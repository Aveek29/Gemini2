version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
  customHeaders:
    - pattern: "**/*"
      header: Cache-Control
      value: "public, max-age=31536000, immutable"
    - pattern: "_next/static/**/*"
      header: Cache-Control
      value: "public, max-age=31536000, immutable"
    - pattern: "_next/data/**/*"
      header: Cache-Control
      value: "public, max-age=3600, s-maxage=86400, stale-while-revalidate=86400"
